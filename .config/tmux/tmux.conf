unbind C-b
set -g prefix C-Space

set -s escape-time 0

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/.tmux.conf"

set -g mouse on

unbind % # default: split vertically
unbind '"' # default: split horizontally

# You might think that something is reversed here, between my keystroke v (for vertical) and the tmux flag -h (for horizontal). Well, yes and no.
# The flag -c execute a shell command, and #{pane_current_path} simply bring you back where you were in the filesystem.
unbind v
bind v split-window -h -c "#{pane_current_path}"

unbind h
bind h split-window -v -c "#{pane_current_path}"

unbind f
bind f new-window ~/.config/tmux/tmux-sessionizer.sh

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

set -g history-limit 100000

unbind n # default: move to next window
unbind w # default: change current window interactively

bind n command-prompt "rename-window '%%'"
bind w new-window -c "#{pane_current_path}"

set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

set -g detach-on-destroy off

set-window-option -g mode-keys vi

unbind -T copy-mode-vi Space; # default: begin select
unbind -T copy-mode-vi Enter; # default: end select

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

# Rose Pine Moon Color Palette
set -g @rp_base "#232136"
set -g @rp_surface "#2a273f"
set -g @rp_overlay "#393552"
set -g @rp_muted "#6e6a86"
set -g @rp_subtle "#908caa"
set -g @rp_text "#e0def4"
set -g @rp_love "#eb6f92"
set -g @rp_gold "#f6c177"
set -g @rp_rose "#ea9a97"
set -g @rp_pine "#3e8fb0"
set -g @rp_foam "#9ccfd8"
set -g @rp_iris "#c4a7e7"
set -g @rp_highlight_low "#2a283e"
set -g @rp_highlight_med "#44415a"
set -g @rp_highlight_high "#56526e"

# Styling
set -g status-position top
set -g status-left-length 100
set -g status-style "fg=#{@rp_text},bg=default"
set -g status-left "#[fg=#{@rp_pine}][#S] "
set -g window-status-current-format "#[fg=#{@rp_rose}]#I:#W"
set -g window-status-format "#[fg=#{@rp_muted}]#I:#W"
set -g message-style "fg=#{@rp_gold},bg=default,bold,italics"
set -g pane-border-style "fg=#{@rp_highlight_med}"
set -g pane-active-border-style "fg=#{@rp_text}"
set -g status-justify absolute-centre
set -g status-right ""

set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"
# Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'nv' # Replace with your actual aliases

# Initialize tpm
run '~/.tmux/plugins/tpm/tpm'
